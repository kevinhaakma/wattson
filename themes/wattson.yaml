# Wattson — Home Assistant thema
#
# Installatie: kopieer dit bestand naar <config>/themes/wattson.yaml
# (of naar de map die je "themes:" folder in configuration.yaml noemt) en
# selecteer "Wattson" bij Instellingen -> Weergave -> Thema.
#
# Donker thema op het Wattson-brandpalet:
#   navy #0D1B2A · blauw #1565C0 · teal #00B4B0 · groen #22C55E · licht #F2F4F7

Wattson:
  # ---------- basis ----------
  mode: dark
  primary-color: "#00B4B0"
  accent-color: "#22C55E"
  dark-primary-color: "#0D1B2A"

  primary-background-color: "#0A1521"
  secondary-background-color: "#0F1E2D"
  card-background-color: "#132539"
  clear-background-color: "#0A1521"

  primary-text-color: "#F2F4F7"
  secondary-text-color: "#96A9BC"
  disabled-text-color: "#4C6076"
  divider-color: "#21374E"

  # ---------- ha-card ----------
  ha-card-background: "var(--card-background-color)"
  ha-card-border-radius: "16px"
  ha-card-border-width: "1px"
  ha-card-border-color: "#21374E"
  ha-card-box-shadow: "0 2px 10px 0 rgba(0, 0, 0, 0.35)"
  ha-card-header-color: "var(--primary-text-color)"

  # ---------- app / header ----------
  app-header-background-color: "#0A1521"
  app-header-text-color: "#F2F4F7"
  app-header-edit-background-color: "#0F1E2D"

  # ---------- sidebar ----------
  sidebar-background-color: "#0A1521"
  sidebar-text-color: "#96A9BC"
  sidebar-icon-color: "#96A9BC"
  sidebar-selected-icon-color: "#00B4B0"
  sidebar-selected-text-color: "#00B4B0"
  sidebar-border-color: "#21374E"

  # ---------- interactie ----------
  primary-color-light: "#4DD6D2"
  accent-color-light: "#6EE7A0"
  mdc-theme-primary: "var(--primary-color)"
  switch-checked-color: "#22C55E"
  switch-unchecked-color: "#34495C"
  slider-color: "#00B4B0"
  slider-secondary-color: "#22C55E"
  paper-slider-knob-color: "#00B4B0"
  paper-slider-active-color: "#00B4B0"

  # ---------- states / badges ----------
  state-active-color: "#22C55E"
  state-icon-active-color: "#00B4B0"
  label-badge-blue: "#1565C0"
  label-badge-green: "#22C55E"
  label-badge-red: "#FF5C7A"
  label-badge-yellow: "#F5C542"

  # ---------- grafieken (o.a. wattson-card) ----------
  energy-grid-consumption-color: "#4C9BE8"
  energy-grid-return-color: "#22C55E"
  energy-solar-color: "#F5C542"
  energy-battery-in-color: "#22C55E"
  energy-battery-out-color: "#4C9BE8"
